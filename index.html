<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Ultimate Neon Data Dashboard 🌟</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- 🎨 1. ANIMATED BACKGROUND (พื้นหลังเคลื่อนไหว) --- */
        body {
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #0369a1, #1e40af);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ฟองสบู่ลอยดุ๊กดิ๊กด้านหลัง */
        .circles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; z-index: 0; pointer-events: none;
        }
        .circles li {
            position: absolute; display: block; list-style: none;
            width: 20px; height: 20px; background: rgba(250, 204, 21, 0.15);
            animation: animateBubble 25s linear infinite; bottom: -150px;
            border-radius: 50%;
        }
        .circles li:nth-child(1){ left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .circles li:nth-child(2){ left: 10%; width: 30px; height: 30px; animation-delay: 2s; animation-duration: 12s; background: rgba(56, 189, 248, 0.2); }
        .circles li:nth-child(3){ left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .circles li:nth-child(4){ left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; background: rgba(56, 189, 248, 0.2); }
        .circles li:nth-child(5){ left: 85%; width: 50px; height: 50px; animation-delay: 5s; }

        @keyframes animateBubble {
            0%{ transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 50%; }
            100%{ transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        /* --- 🛍️ 2. MAIN CONTAINER --- */
        .container {
            width: 100%;
            max-width: 1250px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 4px solid #facc15; /* ขอบสีเหลืองทองตัดน้ำเงิน */
            z-index: 1;
        }

        h2 {
            color: #1e3a8a;
            margin-top: 0;
            text-align: center;
            font-size: 2.2rem;
            letter-spacing: 1px;
        }

        /* --- 📝 3. FORM GROUP (Grid 4 คอลัมน์ รองรับข้อมูลเพียบ) --- */
        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            background: #f0fdf4; /* พื้นหลังฟอร์มเขียว/ฟ้าอ่อนสบายตา */
            padding: 25px;
            border-radius: 18px;
            border: 3px dashed #38bdf8;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-box label {
            font-weight: bold;
            color: #1e40af;
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            background-color: white;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.3);
        }

        .btn-container {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .btn-add {
            background: linear-gradient(135deg, #facc15 0%, #eab308 100%);
            color: #0f172a;
            border: none;
            padding: 14px 50px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(234, 179, 8, 0.4);
        }

        .btn-add:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 20px rgba(234, 179, 8, 0.6);
        }

        /* --- 📊 4. TABLE STYLING --- */
        .table-responsive {
            overflow-x: auto;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 14px 16px;
            border-bottom: 2px solid #e2e8f0;
            font-size: 14px;
        }

        th {
            background-color: #1e3a8a; /* สีน้ำเงินเข้ม */
            color: #facc15; /* ตัวอักษรสีเหลือง */
            font-weight: bold;
            white-space: nowrap;
        }

        tr:nth-child(even) { background-color: #f8fafc; }
        tr:hover { background-color: #e0f2fe; }

        .btn-delete {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-delete:hover { background-color: #dc2626; }

        .no-data {
            text-align: center;
            color: #64748b;
            font-style: italic;
            font-size: 16px;
            padding: 40px !important;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            display: inline-block;
        }
        .bg-active { background-color: #dcfce7; color: #166534; }
        .bg-pending { background-color: #fef9c3; color: #854d0e; }
        .bg-inactive { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<ul class="circles">
    <li></li><li></li><li></li><li></li><li></li>
</ul>

<div class="container">
    <h2>✨🚀 Ultimate Neon Dashboard 🔵💛⚡</h2>
    
    <div class="form-group">
        <div class="input-box">
            <label>👤 ชื่อ-นามสกุล <span style="color:red;">*</span></label>
            <input type="text" id="inputName" placeholder="เช่น นายสมชาย ใจดี">
        </div>
        <div class="input-box">
            <label>💼 ตำแหน่ง / บทบาท</label>
            <input type="text" id="inputRole" placeholder="เช่น Manager, Account">
        </div>
        <div class="input-box">
            <label>📅 วัน/เดือน/ปี เกิด</label>
            <input type="date" id="inputBirth">
        </div>
        <div class="input-box">
            <label>🎂 อายุ (ปี)</label>
            <input type="number" id="inputAge" placeholder="เช่น 28" min="1">
        </div>
        <div class="input-box">
            <label>✉️ อีเมล</label>
            <input type="email" id="inputEmail" placeholder="name@company.com">
        </div>
        <div class="input-box">
            <label>📞 เบอร์โทรศัพท์</label>
            <input type="tel" id="inputPhone" placeholder="092-XXX-XXXX">
        </div>
        <div class="input-box">
            <label>💰 เงินเดือน / รายได้ (บาท)</label>
            <input type="number" id="inputSalary" placeholder="เช่น 30000" min="0">
        </div>
        <div class="input-box">
            <label>🚦 สถานะการทำงาน</label>
            <select id="inputStatus">
                <option value="🟢 ทำงานอยู่">🟢 ทำงานอยู่ (Active)</option>
                <option value="🟡 พักงาน">🟡 พักงาน (Pending)</option>
                <option value="🔴 ลาออกแล้ว">🔴 ลาออกแล้ว (Inactive)</option>
            </select>
        </div>
        <div class="input-box" style="grid-column: span auto;">
            <label>📝 หมายเหตุเพิ่มเติม</label>
            <input type="text" id="inputNote" placeholder="ระบุข้อความสั้นๆ (ถ้ามี)">
        </div>
        
        <div class="btn-container">
            <button class="btn-add" onclick="addData()">🚀 บันทึกข้อมูลสุดปัง 🚀</button>
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>🔢 ลำดับ</th>
                    <th>👤 ชื่อ-นามสกุล</th>
                    <th>💼 ตำแหน่ง</th>
                    <th>📅 วันเกิด</th>
                    <th>🎂 อายุ</th>
                    <th>✉️ อีเมล</th>
                    <th>📞 เบอร์โทร</th>
                    <th>💰 เงินเดือน</th>
                    <th>🚦 สถานะ</th>
                    <th>📝 หมายเหตุ</th>
                    <th style="width: 80px; text-align: center;">💥 จัดการ</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr id="noDataRow">
                    <td colspan="11" class="no-data">🛸 อวกาศยังว่างเปล่า.. มาร่วมเติมเต็มข้อมูลกันเถอะ! ✨</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let dataList = [];
    let runningId = 1;

    // ฟังก์ชันช่วยแปลงรูปแบบวันที่ให้เปิดอ่านง่ายแบบไทย (วว/ดด/ปปปป)
    function formatDate(dateString) {
        if (!dateString) return "-";
        const date = new Date(dateString);
        return date.toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function addData() {
        const nameInput = document.getElementById('inputName');
        const roleInput = document.getElementById('inputRole');
        const birthInput = document.getElementById('inputBirth');
        const ageInput = document.getElementById('inputAge');
        const emailInput = document.getElementById('inputEmail');
        const phoneInput = document.getElementById('inputPhone');
        const salaryInput = document.getElementById('inputSalary');
        const statusInput = document.getElementById('inputStatus');
        const noteInput = document.getElementById('inputNote');

        if (nameInput.value.trim() === "") {
            alert("❌ ต้องกรอกชื่อ-นามสกุลก่อนนะครับคนดี! 😉");
            nameInput.focus();
            return;
        }

        // จัดรูปแบบเงินเดือนให้มี Comma สวยๆ (เช่น 30,000)
        let formattedSalary = "-";
        if (salaryInput.value) {
            formattedSalary = Number(salaryInput.value).toLocaleString() + " ฿";
        }

        const newData = {
            id: runningId++,
            name: nameInput.value,
            role: roleInput.value || "ทั่วไป 👤",
            birth: formatDate(birthInput.value),
            age: ageInput.value ? ageInput.value + " ปี" : "-",
            email: emailInput.value || "-",
            phone: phoneInput.value || "-",
            salary: formattedSalary,
            status: statusInput.value,
            note: noteInput.value || "-"
        };

        dataList.push(newData);
        renderTable();

        // เคลียร์ค่าทั้งหมดหลังกดบันทึก
        nameInput.value = ""; roleInput.value = ""; birthInput.value = "";
        ageInput.value = ""; emailInput.value = ""; phoneInput.value = "";
        salaryInput.value = ""; noteInput.value = ""; statusInput.selectedIndex = 0;
        nameInput.focus();
    }

    function deleteData(id) {
        if(confirm("🗑️ ลบจริงเหรอจ๊ะ? ข้อมูลจะปลิวหายไปในอวกาศเลยนะ!")) {
            dataList = dataList.filter(item => item.id !== id);
            renderTable();
        }
    }

    function renderTable() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = ""; 

        if (dataList.length === 0) {
            tableBody.innerHTML = `
                <tr id="noDataRow">
                    <td colspan="11" class="no-data">🛸 อวกาศยังว่างเปล่า.. มาร่วมเติมเต็มข้อมูลกันเถอะ! ✨</td>
                </tr>
            `;
            return;
        }

        dataList.forEach((item, index) => {
            let badgeClass = "bg-active";
            if(item.status.includes("🟡")) badgeClass = "bg-pending";
            if(item.status.includes("🔴")) badgeClass = "bg-inactive";

            const row = `
                <tr>
                    <td><b>${index + 1}</b></td>
                    <td style="color: #1e40af; font-weight: bold;">${item.name}</td>
                    <td>${item.role}</td>
                    <td>${item.birth}</td>
                    <td>${item.age}</td>
                    <td>${item.email}</td>
                    <td>${item.phone}</td>
                    <td style="color: #16a34a; font-weight: bold;">${item.salary}</td>
                    <td><span class="badge ${badgeClass}">${item.status}</span></td>
                    <td style="color: #64748b; font-style: italic;">${item.note}</td>
                    <td style="text-align: center;">
                        <button class="btn-delete" onclick="deleteData(${item.id})">❌ ลบ</button>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }
</script>

</body>
</html>
