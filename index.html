<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 ระบบบันทึกข้อมูลสุดล้ำและสดใส 🌟</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* เอฟเฟกต์ภาพพื้นหลังไล่เฉดสีและเคลื่อนไหวเยื้องกราย */
        body {
            background: linear-gradient(-45deg, #0284c7, #bae6fd, #facc15, #0c4a6e);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* กล่องข้อความสไตล์กระจกฝ้า (Glassmorphism) เล็กน้อยให้ดูหรูหรา */
        .container {
            width: 100%;
            max-width: 1250px;
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 30, 80, 0.25);
            border: 4px solid #ffffff;
        }

        h2 {
            color: #0c4a6e;
            margin-top: 0;
            text-align: center;
            font-size: 2.2rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        /* ฟอร์มกรอกข้อมูลแบบจัดเรียงตารางยืดหยุ่น */
        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            background: #f0f9ff;
            padding: 25px;
            border-radius: 18px;
            border: 2px dashed #7dd3fc;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-box.full-width {
            grid-column: 1 / -1; /* ให้ช่องหมายเหตุยาวเต็มแถว */
        }

        .input-box label {
            font-weight: bold;
            color: #0369a1;
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            background-color: white;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #0284c7;
            box-shadow: 0 0 8px rgba(2, 132, 199, 0.3);
        }

        .btn-container {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .btn-add {
            background-color: #facc15;
            color: #0f172a;
            border: 2px solid #eab308;
            padding: 14px 50px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.2s;
            box-shadow: 0 5px 10px rgba(250, 204, 21, 0.4);
        }

        .btn-add:hover {
            background-color: #eab308;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 15px rgba(234, 179, 8, 0.5);
        }

        /* ส่วนตารางข้อมูล */
        .table-responsive {
            overflow-x: auto;
            border-radius: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 14px 16px;
            border-bottom: 2px solid #e2e8f0;
            font-size: 14px;
        }

        th {
            background-color: #0284c7;
            color: #ffffff;
            font-weight: bold;
            white-space: nowrap;
        }

        tr:nth-child(even) { background-color: #f8fafc; }
        tr:hover { background-color: #e0f2fe; }

        .btn-delete {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-delete:hover { background-color: #dc2626; }

        .no-data {
            text-align: center;
            color: #64748b;
            font-style: italic;
            font-size: 16px;
            padding: 40px !important;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
        }
        .bg-active { background-color: #dcfce7; color: #166534; }
        .bg-pending { background-color: #fef9c3; color: #854d0e; }
        .bg-inactive { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Super Data Dashboard 🌌✨🟡🔵</h2>
    
    <div class="form-group">
        <div class="input-box">
            <label>👤 ชื่อ-นามสกุล <span style="color:red;">*</span></label>
            <input type="text" id="inputName" placeholder="เช่น นายสมชาย สายลุย">
        </div>
        <div class="input-box">
            <label>💼 ตำแหน่ง / บทบาท</label>
            <input type="text" id="inputRole" placeholder="เช่น Developer, นักเรียน">
        </div>
        <div class="input-box">
            <label>📅 วัน/เดือน/ปี เกิด</label>
            <input type="date" id="inputBirth">
        </div>
        <div class="input-box">
            <label>✉️ อีเมล</label>
            <input type="email" id="inputEmail" placeholder="example@email.com">
        </div>
        <div class="input-box">
            <label>📞 เบอร์โทรศัพท์</label>
            <input type="tel" id="inputPhone" placeholder="เช่น 098-765-XXXX">
        </div>
        <div class="input-box">
            <label>💰 เงินเดือน / รายได้ (บาท)</label>
            <input type="number" id="inputSalary" placeholder="เช่น 25000" min="0">
        </div>
        <div class="input-box">
            <label>🚦 สถานะการทำงาน</label>
            <select id="inputStatus">
                <option value="🟢 ทำงานอยู่">🟢 ทำงานอยู่ (Active)</option>
                <option value="🟡 ทดลองงาน">🟡 ทดลองงาน (Pending)</option>
                <option value="🔴 ลาออกแล้ว">🔴 ลาออกแล้ว (Inactive)</option>
            </select>
        </div>
        <div class="input-box full-width">
            <label>📝 หมายเหตุเพิ่มเติม</label>
            <input type="text" id="inputNotes" placeholder="ข้อมูลเพิ่มเติมอื่นๆ (ถ้ามี)">
        </div>
        
        <div class="btn-container">
            <button class="btn-add" onclick="addData()">✨ บันทึกข้อมูลแบบอลังการ ✨</button>
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>🔢 ลำดับ</th>
                    <th>👤 ชื่อ-นามสกุล</th>
                    <th>💼 ตำแหน่ง</th>
                    <th>📅 วันเกิด</th>
                    <th>✉️ อีเมล</th>
                    <th>📞 เบอร์โทรศัพท์</th>
                    <th>💰 เงินเดือน</th>
                    <th>🚦 สถานะ</th>
                    <th>📝 หมายเหตุ</th>
                    <th style="width: 80px; text-align: center;">💥 จัดการ</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr id="noDataRow">
                    <td colspan="10" class="no-data">🔍 พื้นหลังขยับแล้ว แต่ตารางยังว่างอยู่.. ลองกรอกข้อมูลสิครับ! 👀</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let dataList = [];
    let runningId = 1;

    function addData() {
        const nameInput = document.getElementById('inputName');
        const roleInput = document.getElementById('inputRole');
        const birthInput = document.getElementById('inputBirth');
        const emailInput = document.getElementById('inputEmail');
        const phoneInput = document.getElementById('inputPhone');
        const salaryInput = document.getElementById('inputSalary');
        const statusInput = document.getElementById('inputStatus');
        const notesInput = document.getElementById('inputNotes');

        if (nameInput.value.trim() === "") {
            alert("❌ กรุณากรอกชื่อ-นามสกุลด้วยนะครับคนดี! 🥰");
            nameInput.focus();
            return;
        }

        // ฟอร์แมตวันที่ให้อ่านง่ายขึ้น (ถ้ามีการเลือก)
        let formattedDate = "-";
        if(birthInput.value) {
            const dateObj = new Date(birthInput.value);
            formattedDate = dateObj.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        // ฟอร์แมตเงินเดือนให้มีคอมม่า ( , )
        let formattedSalary = "-";
        if(salaryInput.value) {
            formattedSalary = parseFloat(salaryInput.value).toLocaleString('th-TH') + " ฿";
        }

        const newData = {
            id: runningId++,
            name: nameInput.value,
            role: roleInput.value || "ทั่วไป 👤",
            birth: formattedDate,
            email: emailInput.value || "-",
            phone: phoneInput.value || "-",
            salary: formattedSalary,
            status: statusInput.value,
            notes: notesInput.value || "-"
        };

        dataList.push(newData);
        renderTable();

        // รีเซ็ตฟิลด์ทั้งหมด
        nameInput.value = "";
        roleInput.value = "";
        birthInput.value = "";
        emailInput.value = "";
        phoneInput.value = "";
        salaryInput.value = "";
        notesInput.value = "";
        statusInput.selectedIndex = 0;
        nameInput.focus();
    }

    function deleteData(id) {
        if(confirm("🗑️ ลบจริงหรอ? ข้อมูลหายวับไปกับตาเลยน้า~")) {
            dataList = dataList.filter(item => item.id !== id);
            renderTable();
        }
    }

    function renderTable() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = ""; 

        if (dataList.length === 0) {
            tableBody.innerHTML = `
                <tr id="noDataRow">
                    <td colspan="10" class="no-data">🔍 พื้นหลังขยับแล้ว แต่ตารางยังว่างอยู่.. ลองกรอกข้อมูลสิครับ! 👀</td>
                </tr>
            `;
            return;
        }

        dataList.forEach((item, index) => {
            let badgeClass = "bg-active";
            if(item.status.includes("🟡")) badgeClass = "bg-pending";
            if(item.status.includes("🔴")) badgeClass = "bg-inactive";

            const row = `
                <tr>
                    <td><b>${index + 1}</b></td>
                    <td style="color: #0369a1; font-weight: 500; white-space: nowrap;">${item.name}</td>
                    <td>${item.role}</td>
                    <td style="white-space: nowrap;">${item.birth}</td>
                    <td>${item.email}</td>
                    <td style="white-space: nowrap;">${item.phone}</td>
                    <td style="color: #b45309; font-weight: bold;">${item.salary}</td>
                    <td><span class="badge ${badgeClass}">${item.status}</span></td>
                    <td style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${item.notes}">${item.notes}</td>
                    <td style="text-align: center;">
                        <button class="btn-delete" onclick="deleteData(${item.id})">❌ ลบ</button>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }
</script>

</body>
</html>
