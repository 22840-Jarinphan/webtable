<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลรูปแบบตาราง</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fb;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            color: #333;
            margin-top: 0;
            text-align: center;
        }

        /* ฟอร์มกรอกข้อมูล */
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .form-group input {
            flex: 1;
            min-width: 150px;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        .form-group input:focus {
            border-color: #4a90e2;
        }

        .btn-add {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background-color: #27ae60;
        }

        /* ส่วนของตาราง */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-top: 10px;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #edf2f7;
        }

        th {
            background-color: #4a90e2;
            color: white;
            font-weight: 600;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .btn-delete {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .btn-delete:hover {
            background-color: #c0392b;
        }

        .no-data {
            text-align: center;
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 ระบบบันทึกข้อมูล</h2>
    
    <div class="form-group">
        <input type="text" id="inputName" placeholder="ชื่อ-นามสกุล" required>
        <input type="text" id="inputRole" placeholder="ตำแหน่ง / บทบาท">
        <input type="email" id="inputEmail" placeholder="อีเมล">
        <button class="btn-add" onclick="addData()">เพิ่มข้อมูล</button>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>ลำดับ</th>
                    <th>ชื่อ-นามสกุล</th>
                    <th>ตำแหน่ง</th>
                    <th>อีเมล</th>
                    <th style="width: 80px; text-align: center;">จัดการ</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr id="noDataRow">
                    <td colspan="5" class="no-data">ยังไม่มีข้อมูลในระบบ</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let dataList = [];
    let runningId = 1;

    function addData() {
        const nameInput = document.getElementById('inputName');
        const roleInput = document.getElementById('inputRole');
        const emailInput = document.getElementById('inputEmail');

        // ตรวจสอบว่ากรอกชื่อหรือยัง (บังคับกรอก)
        if (nameInput.value.trim() === "") {
            alert("กรุณากรอกชื่อ-นามสกุลด้วยครับ");
            nameInput.focus();
            return;
        }

        // สร้าง Object ข้อมูลใหม่
        const newData = {
            id: runningId++,
            name: nameInput.value,
            role: roleInput.value || "-",
            email: emailInput.value || "-"
        };

        // เพิ่มเข้า Array และอัปเดตตาราง
        dataList.push(newData);
        renderTable();

        // เคลียร์ค่าในช่องกรอก
        nameInput.value = "";
        roleInput.value = "";
        emailInput.value = "";
        nameInput.focus();
    }

    function deleteData(id) {
        if(confirm("คุณต้องการลบข้อมูลแถวนี้ใช่หรือไม่?")) {
            dataList = dataList.filter(item => item.id !== id);
            renderTable();
        }
    }

    function renderTable() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = ""; // เคลียร์ตารางก่อนวาดใหม่

        if (dataList.length === 0) {
            tableBody.innerHTML = `
                <tr id="noDataRow">
                    <td colspan="5" class="no-data">ยังไม่มีข้อมูลในระบบ</td>
                </tr>
            `;
            return;
        }

        // วนลูปนำข้อมูลใน Array มาสร้างเป็นแถวในตาราง
        dataList.forEach((item, index) => {
            const row = `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item.name}</td>
                    <td>${item.role}</td>
                    <td>${item.email}</td>
                    <td style="text-align: center;">
                        <button class="btn-delete" onclick="deleteData(${item.id})">ลบ</button>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }
</script>

</body>
</html>
