<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 ระบบบันทึกข้อมูลสุดสดใส 🌟</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* ใช้พื้นหลังไล่เฉดสีฟ้า-น้ำเงินสดใส */
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: white;
            padding: 35px;
            border-radius: 20px;
            /* เพิ่มเงาหนาๆ นุ่มๆ แบบโมเดิร์น */
            box-shadow: 0 10px 25px rgba(0, 50, 100, 0.15);
            border: 4px solid #38bdf8; /* ขอบสีฟ้าสดใส */
        }

        h2 {
            color: #0c4a6e; /* สีน้ำเงินเข้ม */
            margin-top: 0;
            text-align: center;
            font-size: 2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* ฟอร์มกรอกข้อมูลสไตล์สดใส */
        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            background: #f0f9ff;
            padding: 20px;
            border-radius: 15px;
            border: 2px dashed #7dd3fc;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-box label {
            font-weight: bold;
            color: #0369a1;
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            background-color: white;
        }

        /* โฟกัสแล้วเปลี่ยนเป็นสีฟ้า */
        .form-group input:focus, .form-group select:focus {
            border-color: #0284c7;
            box-shadow: 0 0 8px rgba(2, 132, 199, 0.3);
        }

        /* ปุ่มเพิ่มข้อมูลสีเหลืองทอง ตัดขอบน้ำเงิน เด่นกระแทกตา */
        .btn-container {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            margin-top: 5px;
        }

        .btn-add {
            background-color: #facc15; /* สีเหลืองสดใส */
            color: #0f172a; /* ตัวหนังสือสีเข้ม */
            border: 2px solid #eab308;
            padding: 12px 40px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(250, 204, 21, 0.4);
        }

        .btn-add:hover {
            background-color: #eab308;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(234, 179, 8, 0.5);
        }

        /* ส่วนของตารางสุดจี๊ด */
        .table-responsive {
            overflow-x: auto;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 14px 18px;
            border-bottom: 2px solid #e2e8f0;
        }

        /* หัวตารางสีน้ำเงินเข้ม ตัวหนังสือสีเหลืองเด่นๆ */
        th {
            background-color: #0284c7; /* สีน้ำเงิน/ฟ้าเข้ม */
            color: #ffffff;
            font-weight: bold;
            font-size: 15px;
            white-space: nowrap;
        }

        /* สลับสีแถวตารางให้ดูง่าย */
        tr:nth-child(even) {
            background-color: #f8fafc;
        }

        tr:hover {
            background-color: #e0f2fe; /* ไฮไลท์เวลาเอาเมาส์ชี้เป็นสีฟ้าอ่อน */
        }

        /* ปุ่มลบสไตล์น่ารักแต่ดุดัน */
        .btn-delete {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-delete:hover {
            background-color: #dc2626;
        }

        .no-data {
            text-align: center;
            color: #64748b;
            font-style: italic;
            font-size: 16px;
            padding: 30px !important;
        }

        /* สีสันสำหรับ badge สถานะ */
        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
        }
        .bg-active { background-color: #dcfce7; color: #166534; }
        .bg-pending { background-color: #fef9c3; color: #854d0e; }
        .bg-inactive { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Smart Data Dashboard 🟡🔵✨</h2>
    
    <div class="form-group">
        <div class="input-box">
            <label>👤 ชื่อ-นามสกุล <span style="color:red;">*</span></label>
            <input type="text" id="inputName" placeholder="เช่น นายสมชาย สายลุย">
        </div>
        <div class="input-box">
            <label>💼 ตำแหน่ง / บทบาท</label>
            <input type="text" id="inputRole" placeholder="เช่น Developer, นักเรียน">
        </div>
        <div class="input-box">
            <label>🎂 อายุ (ปี)</label>
            <input type="number" id="inputAge" placeholder="เช่น 25" min="1" max="120">
        </div>
        <div class="input-box">
            <label>✉️ อีเมล</label>
            <input type="email" id="inputEmail" placeholder="example@email.com">
        </div>
        <div class="input-box">
            <label>📞 เบอร์โทรศัพท์</label>
            <input type="tel" id="inputPhone" placeholder="เช่น 098-765-XXXX">
        </div>
        <div class="input-box">
            <label>🚦 สถานะ</label>
            <select id="inputStatus">
                <option value="🟢 ใช้งานอยู่">🟢 ใช้งานอยู่ (Active)</option>
                <option value="🟡 รอตรวจสอบ">🟡 รอตรวจสอบ (Pending)</option>
                <option value="🔴 ระงับใช้งาน">🔴 ระงับใช้งาน (Inactive)</option>
            </select>
        </div>
        <div class="btn-container">
            <button class="btn-add" onclick="addData()">✨ บันทึกข้อมูลลงตาราง ✨</button>
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>🔢 ลำดับ</th>
                    <th>👤 ชื่อ-นามสกุล</th>
                    <th>💼 ตำแหน่ง</th>
                    <th>🎂 อายุ</th>
                    <th>✉️ อีเมล</th>
                    <th>📞 เบอร์โทรศัพท์</th>
                    <th>🚦 สถานะ</th>
                    <th style="width: 90px; text-align: center;">💥 จัดการ</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr id="noDataRow">
                    <td colspan="8" class="no-data">🔍 ตอนนี้ยังโล่งอยู่เลย.. ลองเพิ่มข้อมูลดูสิครับ! 👀</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let dataList = [];
    let runningId = 1;

    function addData() {
        const nameInput = document.getElementById('inputName');
        const roleInput = document.getElementById('inputRole');
        const ageInput = document.getElementById('inputAge');
        const emailInput = document.getElementById('inputEmail');
        const phoneInput = document.getElementById('inputPhone');
        const statusInput = document.getElementById('inputStatus');

        // บังคับกรอกชื่อเหมือนเดิม
        if (nameInput.value.trim() === "") {
            alert("❌ กรุณากรอกชื่อ-นามสกุลก่อนนะครับ! 🥰");
            nameInput.focus();
            return;
        }

        // ดึงค่ามาสร้างอ็อบเจกต์ (ถ้าว่างจะใส่ตัวสำรองที่เหมาะสมให้แทน)
        const newData = {
            id: runningId++,
            name: nameInput.value,
            role: roleInput.value || "ทั่วไป 👤",
            age: ageInput.value ? ageInput.value + " ปี" : "-",
            email: emailInput.value || "-",
            phone: phoneInput.value || "-",
            status: statusInput.value
        };

        dataList.push(newData);
        renderTable();

        // ล้างช่องกรอกเพื่อให้พร้อมกรอกคนต่อไป
        nameInput.value = "";
        roleInput.value = "";
        ageInput.value = "";
        emailInput.value = "";
        phoneInput.value = "";
        statusInput.selectedIndex = 0;
        nameInput.focus();
    }

    function deleteData(id) {
        if(confirm("🗑️ แน่ใจใช่ไหมว่าจะลบข้อมูลแถวนี้? ไม่สามารถย้อนกลับได้น้า~")) {
            dataList = dataList.filter(item => item.id !== id);
            renderTable();
        }
    }

    function renderTable() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = ""; 

        if (dataList.length === 0) {
            tableBody.innerHTML = `
                <tr id="noDataRow">
                    <td colspan="8" class="no-data">🔍 ตอนนี้ยังโล่งอยู่เลย.. ลองเพิ่มข้อมูลดูสิครับ! 👀</td>
                </tr>
            `;
            return;
        }

        dataList.forEach((item, index) => {
            // กำหนดสีพื้นหลังข้อความสถานะเพื่อให้เข้าธีมสีไฟจราจร
            let badgeClass = "bg-active";
            if(item.status.includes("🟡")) badgeClass = "bg-pending";
            if(item.status.includes("🔴")) badgeClass = "bg-inactive";

            const row = `
                <tr>
                    <td><b>${index + 1}</b></td>
                    <td style="color: #0369a1; font-weight: 500;">${item.name}</td>
                    <td>${item.role}</td>
                    <td>${item.age}</td>
                    <td>${item.email}</td>
                    <td>${item.phone}</td>
                    <td><span class="badge ${badgeClass}">${item.status}</span></td>
                    <td style="text-align: center;">
                        <button class="btn-delete" onclick="deleteData(${item.id})">❌ ลบ</button>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }
</script>

</body>
</html>
